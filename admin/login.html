<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080c10; --surface: #0f1520; --surface2: #161e2e;
      --border: rgba(255,255,255,0.07); --accent: #00e5ff;
      --text: #e8edf5; --muted: #7a8799; --radius: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Glow background */
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: #00e5ff;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.05;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    .login-logo {
      font-family: 'Space Mono', monospace;
      color: var(--accent);
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }
    .login-title {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
    }
    .login-desc {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }
    label { font-size: 0.82rem; font-weight: 600; color: var(--muted); }
    input {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }

    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: all 0.2s;
    }
    .btn-login:hover { background: #00b8d4; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }
    .error-msg.show { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">&lt;Admin /&gt;</div>
    <h1 class="login-title">Bienvenido</h1>
    <p class="login-desc">Ingresa tus credenciales para acceder al panel.</p>

    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="input-email" placeholder="tu@email.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="input-password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login" id="btn-submit">Ingresar →</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>

  <script type="module">
    import { AuthService } from '../src/services/auth.js'

    ;(async () => {
      // Si ya hay sesión activa, redirige directo al panel
      const session = await AuthService.getSession()
      if (session) { window.location.href = '/admin/'; return }
    })()

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()

      const email    = document.getElementById('input-email').value.trim()
      const password = document.getElementById('input-password').value
      const btn      = document.getElementById('btn-submit')
      const errorEl  = document.getElementById('error-msg')

      btn.textContent = 'Ingresando...'
      btn.disabled    = true
      errorEl.classList.remove('show')

      try {
        await AuthService.login(email, password)
        window.location.href = '/admin/'
      } catch (err) {
        errorEl.textContent = '❌ Email o contraseña incorrectos'
        errorEl.classList.add('show')
        btn.textContent = 'Ingresar →'
        btn.disabled    = false
      }
    })
  </script>
</body>
</html>
